name: CI - Frontend Quality Gate

# Se ejecuta cuando subes código a develop o haces PR hacia main
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: 🔍 Verificar Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias (igual que Vercel)
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Verificar TypeScript
        run: npx tsc --noEmit

      - name: 📦 Build completo (simulando Vercel)
        run: npm run build
